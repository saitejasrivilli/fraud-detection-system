version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: fraud_detection_db
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_password_123
      POSTGRES_DB: fraud_detection
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fraud_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fraud_detection_cache
    ports:
      - "6379:6379"
    networks:
      - fraud_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Fraud Detection API
  api:
    build: .
    container_name: fraud_detection_api
    environment:
      DATABASE_URL: postgresql://fraud_user:fraud_password_123@postgres:5432/fraud_detection
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-secret-key-change-in-production
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./results:/app/results
      - ./logs:/app/logs
    networks:
      - fraud_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PgAdmin (Database UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fraud_detection_admin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fraud.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - fraud_network

volumes:
  postgres_data:

networks:
  fraud_network:
    driver: bridge
